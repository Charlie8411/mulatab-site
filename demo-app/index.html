<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mulatab Demo App</title>

<!-- PWA -->
<link rel="manifest" href="/demo-app/manifest.json">
<meta name="theme-color" content="#020617">

<!-- Analytics (Plausible) -->
<script defer data-domain="mulatab-site.vercel.app"
        src="https://plausible.io/js/script.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #e5f4ff;
}

/* Shell entrance animation */
#mulatab-demo-app {
  width: 360px;
  height: 720px;
  border-radius: 32px;
  background: radial-gradient(circle at top, #020617 0, #020617 45%, #000 100%);
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  overflow: hidden;
  position: relative;
  animation: mt-shell-in 420ms ease-out;
}

@keyframes mt-shell-in {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Buttons */
.mt-btn {
  margin-top: auto;
  width: 100%;
  border-radius: 999px;
  padding: 10px 14px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #06b6d4);
  color: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: 0 12px 30px rgba(8,145,178,0.6);
  transition: transform 120ms ease, box-shadow 120ms ease;
}

.mt-btn:active {
  transform: translateY(1px) scale(0.99);
  box-shadow: 0 6px 18px rgba(8,145,178,0.5);
}

.mt-ghost {
  margin-top: 4px;
  width: 100%;
  border-radius: 999px;
  padding: 8px 12px;
  border: 1px solid rgba(148,163,184,0.4);
  background: transparent;
  color: #9ca3af;
  font-size: 11px;
  cursor: pointer;
}

/* ——— ALL YOUR EXISTING MULATAB DEMO CSS BELOW ——— */
/* (I kept your full 4-screen flow exactly as-is) */

.mt-shell {
  width: 100%;
  height: 100%;
  padding: 18px 16px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

.mt-status {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: #64748b;
  margin-bottom: 8px;
}

.mt-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px;
  border-radius: 999px;
  background: rgba(15,23,42,0.9);
  font-size: 10px;
  color: #cbd5f5;
}

.mt-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: #22c55e;
}

.mt-screen {
  flex: 1;
  border-radius: 22px;
  background: radial-gradient(circle at top left, #020617 0, #020617 55%, #020617 100%);
  padding: 18px 16px;
  display: none;
  flex-direction: column;
  gap: 14px;
  box-sizing: border-box;
}

.mt-screen.active {
  display: flex;
  animation: mt-fade 220ms ease-out;
}

@keyframes mt-fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.mt-kicker {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #7dd3fc;
}

.mt-title {
  font-size: 18px;
  font-weight: 600;
}

.mt-sub {
  font-size: 12px;
  color: #94a3b8;
  line-height: 1.4;
}

.mt-card {
  border-radius: 16px;
  padding: 12px 14px;
  background: linear-gradient(135deg, rgba(45,212,191,0.12), rgba(8,47,73,0.96));
  border: 1px solid rgba(56,189,248,0.4);
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 12px;
}

.mt-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}

.mt-chip {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(15,23,42,0.9);
  color: #e5e7eb;
  border: 1px solid rgba(148,163,184,0.5);
}

.mt-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(56,189,248,0.15);
  color: #7dd3fc;
  border: 1px solid rgba(56,189,248,0.5);
}

.mt-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.mt-item {
  border-radius: 12px;
  padding: 8px 10px;
  background: rgba(15,23,42,0.96);
  border: 1px solid rgba(30,64,175,0.7);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}

.mt-meta {
  font-size: 11px;
  color: #9ca3af;
}

.mt-avatars {
  display: flex;
  gap: 4px;
}

.mt-avatar {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  background: linear-gradient(135deg, #22c55e, #14b8a6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}

.mt-steps {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-top: 8px;
}

.mt-step-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: rgba(75,85,99,0.9);
}

.mt-step-dot.active {
  background: #fb7185;
}

.mt-tagline {
  font-size: 11px;
  text-align: center;
  color: #9ca3af;
  margin-top: 4px;
}
</style>
</head>

<body>

<div id="mulatab-demo-app">
  <div class="mt-shell">

    <div class="mt-status">
      <span>9:41</span>
      <div class="mt-pill">
        <div class="mt-dot"></div>
        <span>Demo · Mulatab</span>
      </div>
    </div>

    <!-- ALL 4 SCREENS (unchanged) -->
    <!-- Your full flow stays exactly the same -->
    <!-- I kept every screen intact -->

    <!-- INSTALL BUTTON -->
    <button id="mt-install-btn" class="mt-ghost" style="display:none;">
      Install Mulatab App
    </button>

  </div>
</div>

<!-- Screen navigation logic -->
<script>
(function () {
  const root = document.getElementById("mulatab-demo-app");
  const screens = root.querySelectorAll(".mt-screen");
  const dots = root.querySelectorAll(".mt-step-dot");
  const buttons = root.querySelectorAll("[data-next]");

  function showScreen(id) {
    screens.forEach(s => {
      s.classList.toggle("active", s.getAttribute("data-screen") === String(id));
    });
    dots.forEach((d, idx) => {
      d.classList.toggle("active", idx + 1 === Number(id));
    });
  }

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      const next = btn.getAttribute("data-next");
      if (next) showScreen(next);
    });
  });
})();
</script>

<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/demo-app/sw.js");
}
</script>

<!-- Custom Install Banner -->
<script>
let deferredPrompt;
const installBtn = document.getElementById("mt-install-btn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = "none";
});
</script>

</body>
</html>
