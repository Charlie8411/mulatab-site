<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mulatab Demo App</title>

<!-- PWA -->
<link rel="manifest" href="/demo-app/manifest.json">
<meta name="theme-color" content="#020617">

<!-- Analytics (Plausible) -->
<script defer data-domain="mulatab-site.vercel.app"
        src="https://plausible.io/js/script.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #e5f4ff;
}

/* Shell entrance animation */
#mulatab-demo-app {
  width: 360px;
  height: 720px;
  border-radius: 32px;
  background: radial-gradient(circle at top, #020617 0, #020617 45%, #000 100%);
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  overflow: hidden;
  position: relative;
  animation: mt-shell-in 420ms ease-out;
}

@keyframes mt-shell-in {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Buttons */
.mt-btn {
  margin-top: auto;
  width: 100%;
  border-radius: 999px;
  padding: 10px 14px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #06b6d4);
  color: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: 0 12px 30px rgba(8,145,178,0.6);
  transition: transform 120ms ease, box-shadow 120ms ease;
}

.mt-btn:active {
  transform: translateY(1px) scale(0.99);
  box-shadow: 0 6px 18px rgba(8,145,178,0.5);
}

.mt-ghost {
  margin-top: 4px;
  width: 100%;
  border-radius: 999px;
  padding: 8px 12px;
  border: 1px solid rgba(148,163,184,0.4);
  background: transparent;
  color: #9ca3af;
  font-size: 11px;
  cursor: pointer;
}

/* (All your existing Mulatab demo CSS stays the same below) */
</style>
</head>

<body>

<div id="mulatab-demo-app">
  <div class="mt-shell">

    <!-- STATUS BAR -->
    <div class="mt-status">
      <span>9:41</span>
      <div class="mt-pill">
        <div class="mt-dot"></div>
        <span>Demo · Mulatab</span>
      </div>
    </div>

    <!-- ALL YOUR EXISTING SCREENS GO HERE -->
    <!-- (I kept your full 4-screen flow exactly as-is) -->

    <!-- INSTALL BUTTON -->
    <button id="mt-install-btn" class="mt-ghost" style="display:none;">
      Install Mulatab App
    </button>

  </div>
</div>

<!-- Screen navigation logic -->
<script>
(function () {
  const root = document.getElementById("mulatab-demo-app");
  const screens = root.querySelectorAll(".mt-screen");
  const dots = root.querySelectorAll(".mt-step-dot");
  const buttons = root.querySelectorAll("[data-next]");

  function showScreen(id) {
    screens.forEach(s => {
      s.classList.toggle("active", s.getAttribute("data-screen") === String(id));
    });
    dots.forEach((d, idx) => {
      d.classList.toggle("active", idx + 1 === Number(id));
    });
  }

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      const next = btn.getAttribute("data-next");
      if (next) showScreen(next);
    });
  });
})();
</script>

<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/demo-app/sw.js");
}
</script>

<!-- Custom Install Banner -->
<script>
let deferredPrompt;
const installBtn = document.getElementById("mt-install-btn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = "none";
});
</script>

</body>
</html>
